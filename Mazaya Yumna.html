    .k10 { bottom: 5%; left: 35%; }
    .k11 { bottom: 5%; right: 5%; }

    .konten {
      position: relative;
      z-index: 1;
      text-align: center;
    }

    /* Foto di bagian bawah halaman */
    .foto-bawah {
      display: block;
      width: 100%;
      max-height: 400px;
      object-fit: cover;
      object-position: top;
      margin-top: 40px;
    }
  </style>
</head>
<body>
